{% extends 'base.html' %}
{% block title %}Announcement — CampusArena{% endblock %}
{% block content %}
<div class="container-narrow" style="padding-top:40px;padding-bottom:80px;">
    <h2 class="mb-3">Post Announcement</h2>
    <div class="card">
        <div class="card-body">
            <form method="post">{% csrf_token %}
                {% for field in form %}
                <div class="form-group">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="form-error">{{ field.errors.0 }}</div>{% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary">Post announcement</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
