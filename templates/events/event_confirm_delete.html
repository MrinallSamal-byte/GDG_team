{% extends 'base.html' %}
{% block title %}Delete {{ object.title }} — CampusArena{% endblock %}
{% block content %}
<div class="container-narrow" style="padding-top:60px;">
    <div class="card">
        <div class="card-body text-center">
            <h2 class="mb-2">Archive this event?</h2>
            <p class="text-secondary mb-3">{{ object.title }} will be hidden from public view but data will be
                preserved.</p>
            <form method="post">{% csrf_token %}
                <div class="flex gap-2 justify-center">
                    <button type="submit" class="btn btn-danger">Yes, archive it</button>
                    <a href="{{ object.get_absolute_url }}" class="btn btn-secondary">No, keep it</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
