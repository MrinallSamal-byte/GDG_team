{% extends 'base.html' %}
{% block title %}Reset Password — CampusArena{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Choose a new password</h2>
        <form method="post">{% csrf_token %}
            <div class="form-group"><label class="form-label">New password</label>{{ form.password1 }}</div>
            <div class="form-group"><label class="form-label">Confirm</label>{{ form.password2 }}</div>
            {% if form.errors %}<div class="form-error mb-2">{{ form.non_field_errors.0 }}</div>{% endif %}
            <button type="submit" class="btn btn-primary" style="width:100%;">Reset password</button>
        </form>
    </div>
</div>
{% endblock %}
