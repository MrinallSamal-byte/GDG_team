{% extends 'base.html' %}
{% block title %}Forgot Password — CampusArena{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Reset your password</h2>
        <p class="subtitle">Enter the email address you used to sign up and we'll send you a reset link.</p>
        <form method="post">{% csrf_token %}
            <div class="form-group">
                <label class="form-label">Email address</label>
                {{ form.email }}
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Send reset link</button>
        </form>
        <div class="auth-divider"><span>Remembered it?</span></div>
        <a href="{% url 'users:login' %}" class="btn btn-outline" style="width:100%;">Back to sign in</a>
    </div>
</div>
{% endblock %}
