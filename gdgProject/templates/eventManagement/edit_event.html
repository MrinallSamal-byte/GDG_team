{% extends 'base.html' %}

{% block title %}CampusArena | Edit {{ event.title }}{% endblock %}

{% block content %}
<section class="section">
    <div class="welcome-header reveal">
        <p class="eyebrow"><i data-lucide="edit-3"></i> Event Management</p>
        <h1>Edit Event</h1>
        <p class="muted">Update details for <strong>{{ event.title }}</strong>.</p>
    </div>

    <form method="POST" action="" novalidate class="create-event-form reveal">
        {% csrf_token %}

        <!-- Basics -->
        <article class="surface">
            <h2><i data-lucide="info"></i> Event Basics</h2>
            <div class="field-grid">
                <div class="form-field" style="grid-column:1/-1;">
                    <i data-lucide="type"></i>
                    <input type="text" name="title" placeholder="Event title" required
                           value="{{ event.title }}">
                </div>
                <div class="form-field">
                    <i data-lucide="tag"></i>
                    <select name="category">
                        {% for val, label in categories %}
                        <option value="{{ val }}" {% if event.category == val %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-field">
                    <i data-lucide="monitor"></i>
                    <select name="mode">
                        {% for val, label in modes %}
                        <option value="{{ val }}" {% if event.mode == val %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-field">
                    <i data-lucide="activity"></i>
                    <select name="status">
                        {% for val, label in statuses %}
                        <option value="{{ val }}" {% if event.status == val %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-field" style="grid-column:1/-1;">
                    <textarea name="description" rows="4"
                              style="padding-left:.9rem;">{{ event.description }}</textarea>
                </div>
            </div>
        </article>

        <!-- Dates & Venue -->
        <article class="surface">
            <h2><i data-lucide="calendar-days"></i> Dates & Location</h2>
            <div class="field-grid">
                <div class="form-field">
                    <i data-lucide="calendar"></i>
                    <input type="date" name="start_date"
                           value="{{ event.event_start|date:'Y-m-d' }}">
                </div>
                <div class="form-field">
                    <i data-lucide="calendar-check"></i>
                    <input type="date" name="end_date"
                           value="{{ event.event_end|date:'Y-m-d' }}">
                </div>
                <div class="form-field">
                    <i data-lucide="calendar-plus"></i>
                    <input type="date" name="registration_start"
                           value="{{ event.registration_start|date:'Y-m-d' }}">
                </div>
                <div class="form-field">
                    <i data-lucide="calendar-minus"></i>
                    <input type="date" name="registration_end"
                           value="{{ event.registration_end|date:'Y-m-d' }}">
                </div>
                <div class="form-field" style="grid-column:1/-1;">
                    <i data-lucide="map-pin"></i>
                    <input type="text" name="venue" placeholder="Venue / Platform"
                           value="{{ event.venue }}">
                </div>
            </div>
        </article>

        <!-- Participation -->
        <article class="surface">
            <h2><i data-lucide="users"></i> Participation</h2>
            <div class="field-grid">
                <div class="form-field">
                    <i data-lucide="hash"></i>
                    <input type="number" name="max_participants" placeholder="Max participants" min="1"
                           value="{{ event.capacity }}">
                </div>
                <div class="form-field">
                    <i data-lucide="shield-check"></i>
                    <textarea name="eligibility" rows="2"
                              style="padding-left:.9rem;">{{ event.eligibility }}</textarea>
                </div>
                <div class="form-field" style="grid-column:1/-1;">
                    <i data-lucide="scroll-text"></i>
                    <textarea name="rules" rows="3"
                              style="padding-left:.9rem;">{{ event.rules }}</textarea>
                </div>
            </div>
        </article>

        <!-- Prizes -->
        <article class="surface">
            <h2><i data-lucide="trophy"></i> Prizes</h2>
            <div class="field-grid">
                <div class="form-field">
                    <i data-lucide="medal"></i>
                    <input type="text" name="prize_1st" placeholder="1st place"
                           value="{{ event.prize_1st }}">
                </div>
                <div class="form-field">
                    <i data-lucide="medal"></i>
                    <input type="text" name="prize_2nd" placeholder="2nd place"
                           value="{{ event.prize_2nd }}">
                </div>
                <div class="form-field">
                    <i data-lucide="medal"></i>
                    <input type="text" name="prize_3rd" placeholder="3rd place"
                           value="{{ event.prize_3rd }}">
                </div>
            </div>
        </article>

        <div style="display:flex;gap:.7rem;justify-content:flex-end;">
            <a href="{% url 'eventManagement:organizer_dashboard' %}" class="btn-secondary">
                <i data-lucide="arrow-left"></i> Cancel
            </a>
            <a href="{% url 'eventManagement:export_csv' event.id %}" class="btn-secondary">
                <i data-lucide="download"></i> Export CSV
            </a>
            <button type="submit" class="btn-primary">
                <i data-lucide="save"></i> Save Changes
            </button>
        </div>
    </form>
</section>
{% endblock %}
