{% extends "base.html" %}
{% load static %}

{% block title %}404 — Page Not Found | CampusArena{% endblock %}

{% block content %}
<section class="error-page">
    <div class="error-visual">
        <span class="error-code">404</span>
        <i data-lucide="map-pin-off" class="error-icon"></i>
    </div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-message">
        Looks like this page took a wrong turn. It may have been moved, deleted,
        or the URL might be typed incorrectly.
    </p>
    <div class="error-actions">
        <a href="{% url 'events:home' %}" class="btn-primary">
            <i data-lucide="home"></i> Go to Home
        </a>
        <button class="btn-secondary" onclick="history.back()">
            <i data-lucide="arrow-left"></i> Go Back
        </button>
    </div>
</section>
{% endblock %}
