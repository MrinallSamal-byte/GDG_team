{% extends 'base.html' %}

{% block title %}CampusArena | Forgot Password{% endblock %}

{% block content %}
<section class="auth-wrap">
    <article class="surface auth-card">
        <h1>Reset your password</h1>
        <p class="muted">Enter your registered email to receive a password reset link.</p>
        <div class="field-grid">
            <input type="email" placeholder="Enter email">
        </div>
        <button class="btn-primary full-btn">Send reset link</button>
        <a class="auth-back" href="{% url 'users:login' %}">Back to login</a>
    </article>
</section>
{% endblock %}
