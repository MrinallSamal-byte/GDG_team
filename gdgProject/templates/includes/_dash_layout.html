{# ── Shared dashboard layout CSS — include inside {% block extra_css %} #}
<style>
/* ── Layout ───────────────────────────────────────────────────────── */
.main-content { padding: 0 !important; max-width: 100% !important; width: 100% !important; }
.n-dash       { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 64px); }
.n-dash-content { padding: 2rem 2.5rem 4rem; overflow-x: hidden; }

/* ── Page header ──────────────────────────────────────────────────── */
.n-head { display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);
    flex-wrap: wrap; gap: .5rem; }
.n-head-l  { display: flex; align-items: center; gap: .5rem; }
.n-num     { font-family: var(--font-mono); font-size: .65rem; font-weight: 700;
    color: var(--primary); letter-spacing: .1em; opacity: .7; }
.n-name    { font-size: .75rem; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--text); }

/* ── Rows ─────────────────────────────────────────────────────────── */
.n-row { padding: .75rem 1.1rem; border-bottom: 1px solid var(--border-soft); transition: background .15s; }
.n-row:last-child { border-bottom: none; }
.n-row:hover { background: var(--surface-2); }

/* ── Tags ─────────────────────────────────────────────────────────── */
.n-tag       { display: inline-flex; align-items: center; padding: .18rem .5rem;
    border: 1px solid var(--border); font-size: .7rem; font-weight: 700;
    letter-spacing: .04em; text-transform: uppercase; color: var(--muted);
    font-family: var(--font-mono); }
.n-tag.green { border-color: rgba(0,230,118,.25); background: var(--ok-soft); color: var(--ok); }
.n-tag.red   { border-color: rgba(255,82,82,.25); background: var(--danger-soft); color: var(--danger); }
.n-tag.amber { border-color: rgba(255,179,0,.25); background: var(--warn-soft); color: var(--warn); }

/* ── Mobile sidebar button ────────────────────────────────────────── */
.n-dash-sidebar-btn {
    display: none; align-items: center; gap: .4rem; padding: .3rem .65rem;
    border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    font-size: .75rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    cursor: pointer; border-radius: var(--radius-md); transition: all .15s;
    font-family: var(--font);
}
.n-dash-sidebar-btn:hover { border-color: var(--border-hover); color: var(--text); }

/* ── Responsive ───────────────────────────────────────────────────── */
@media (max-width: 1024px) {
    .n-dash             { grid-template-columns: 1fr; }
    .n-dash-content     { padding: 1.5rem 1.25rem 4rem; }
    .n-dash-sidebar-btn { display: inline-flex; }
}
@media (max-width: 768px) {
    .n-dash-content     { padding: 1.25rem .9rem 5rem; }
}
@media (max-width: 480px) {
    .n-dash-content     { padding: 1rem .75rem 5rem; }
}
</style>
