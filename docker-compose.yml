# ═══════════════════════════════════════════════════════════════════════════════
# CampusArena — Docker Compose (Django + PostgreSQL + Redis)
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── MySQL ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: campusarena
      MYSQL_USER: campusarena
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (cache + future Celery broker) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Django Application ───────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: campusarena
      DB_USER: campusarena
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_HOST: db
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      CACHE_BACKEND: django.core.cache.backends.redis.RedisCache
      CACHE_LOCATION: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysqldata:
