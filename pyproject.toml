[tool.isort]
profile = "black"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "gdgProject.settings.test"
python_files = ["tests.py", "test_*.py", "*_test.py"]
addopts = "-v --tb=short"

[tool.ruff]
line-length = 100
target-version = "py312"
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.ruff.per-file-ignores]
"*/migrations/*.py" = ["E501", "F401"]
"*/settings/*.py"  = ["F401", "F403", "F405"]

[tool.coverage.run]
source = ["gdgProject"]
omit = ["*/migrations/*", "manage.py", "*/settings/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
