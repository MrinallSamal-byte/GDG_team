# ═══════════════════════════════════════════════════════════════════════════════
# CampusArena — Railway deployment config
#
# Railway is the RECOMMENDED platform for this app because it supports:
#   ✓ Docker builds
#   ✓ Persistent WebSockets (Django Channels)
#   ✓ MySQL / PostgreSQL (managed)
#   ✓ Redis (managed)
#   ✓ Long-running processes (no serverless timeout)
#
# Deploy:
#   1. railway login
#   2. railway link  (or railway new)
#   3. railway up
#
# Provision managed services in the Railway dashboard:
#   • Add "MySQL" plugin  → set DB_* env vars
#   • Add "Redis" plugin  → set REDIS_URL env var
# ═══════════════════════════════════════════════════════════════════════════════

[build]
builder       = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand        = "daphne --bind 0.0.0.0 --port $PORT --proxy-headers --access-log - gdgProject.asgi:application"
healthcheckPath     = "/health/"
healthcheckTimeout  = 300
restartPolicyType   = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Environment variables — set secrets in the Railway dashboard, not here.
# These are non-secret defaults that are safe to commit.
[[deploy.envs]]
DJANGO_SETTINGS_MODULE = "gdgProject.settings.prod"
PYTHONUNBUFFERED       = "1"
